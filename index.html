<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dịch vụ tăng tương tác</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

.header{
  background:#0070ba;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.container{
  padding:20px;
}

.card{
  background:white;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input, select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

.btn{
  width:100%;
  padding:12px;
  background:#0070ba;
  color:white;
  border:none;
  border-radius:8px;
  margin-top:10px;
  font-size:16px;
}

.total{
  font-size:18px;
  font-weight:bold;
  color:#0070ba;
  margin-top:10px;
}
</style>

</head>
<body>

<div class="header">Dịch vụ tăng tương tác</div>

<div class="container">

<div class="card">
  <input type="text" id="link" placeholder="Nhập link TikTok / Facebook">

  <select id="service" onchange="tinhTien()">
    <option value="0">Chọn dịch vụ</option>
    <option value="10">Like (10đ / cái)</option>
    <option value="20">Follow (20đ / cái)</option>
    <option value="30">View (30đ / cái)</option>
  </select>

  <input type="number" id="amount" placeholder="Số lượng" oninput="tinhTien()">

  <div class="total" id="total">Tổng: 0đ</div>

  <button class="btn" onclick="datDon()">Đặt đơn</button>
  <button class="btn" onclick="thanhToan()">Thanh toán</button>
</div>

</div>

<script>
function tinhTien(){
  let gia = document.getElementById("service").value;
  let soLuong = document.getElementById("amount").value;

  let tong = gia * soLuong;

  document.getElementById("total").innerText = "Tổng: " + tong + "đ";
}

function datDon(){
  let link = document.getElementById("link").value;

  if(link == ""){
    alert("Nhập link trước");
  }else{
    alert("Đặt đơn thành công (demo)");
  }
}

function thanhToan(){
  alert("Thanh toán thành công (demo)");
}
</script>

</body>
</html>
