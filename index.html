<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dịch vụ Marketing</title>
<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

.header {
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.box {
  max-width: 400px;
  background: white;
  margin: 30px auto;
  padding: 20px;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 12px;
  background: green;
  color: white;
  border: none;
  margin-top: 15px;
}

.success {
  color: green;
  text-align: center;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="header">DỊCH VỤ MARKETING ONLINE</div>

<div class="box">

<input id="link" placeholder="Link TikTok / Facebook">

<select id="service">
  <option value="50000">Tăng follow (quảng cáo) - 50.000đ</option>
  <option value="100000">Tăng tương tác bài viết - 100.000đ</option>
  <option value="200000">Quảng cáo TikTok Ads - 200.000đ</option>
</select>

<input id="amount" type="number" placeholder="Số lượng">

<button onclick="order()">Đặt dịch vụ</button>

<div id="msg" class="success"></div>

</div>

<script>
function order() {
  let link = document.getElementById("link").value;
  let amount = document.getElementById("amount").value;
  let price = document.getElementById("service").value;

  if(link === "" || amount === "") {
    alert("Nhập đầy đủ thông tin");
    return;
  }

  let total = price * amount;

  document.getElementById("msg").innerHTML =
    "✅ Đã tạo đơn thành công<br>" +
    "💰 Tổng tiền: " + total.toLocaleString() + "đ";
}
</script>

</body>
</html>
